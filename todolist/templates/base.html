<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">    
    <script src="https://kit.fontawesome.com/2fcf3cdfd5.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <nav>
            <a href="{{ url_for('index') }}"><h1>Keep Notes</h1></a>
            <ul>
                {% if g.user %}
                <li>Olá, <span class="username">{{ g.user['username'] }}</span>
                <li class="logout-button"><a href="{{ url_for('auth.logout') }}">Log Out</a>
                {% else %}
                <li><a href="{{ url_for('auth.register') }}">Register</a>
                <li><a href="{{ url_for('auth.login') }}">Log In</a>
                {% endif %}
            </ul>
        </nav>
        <section class="content">
            <header>
                {% block header %}{% endblock %}
            </header>
            <!--{% for message in get_flashed_messages() %}
                <div class="flash">{{ message }}</div>
            {% endfor %}-->
            {% block content %}{% endblock %}
        </section>
         <footer>
            <p>&copy; 2026 Keep Notes App</p>
        </footer>
    </div>
   
</body>
</html>
