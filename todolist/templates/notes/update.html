{% extends "base.html" %}

{% block header %}
  
{% endblock %}

{% block content %}
  <div class="form-container">
        <h1>{% block title %}Edit "{{ task['title'] }}"{% endblock %}</h1>
        <form method="post">
            <div>
                <label for="title">Title</label>
                <input name="title" id="title" 
                value="{{ request.form['title'] or task['title'] }}" type="text">
            </div>
            <div>
                <label for="task">Task</label>
                <textarea name="task" id="task">{{ request.form['task'] or task.task }}</textarea>
            </div>
            <input class="primary" type="submit" value="Save Note">
        </form>
        <hr>
        <form action="{{ url_for('notes.delete', id=task['id']) }}" method="post">
            <input class="danger" type="submit" value="Delete" onclick="return confirm('Are you sure?');">
        </form>
   </div>
{% endblock %}
